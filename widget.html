<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Widget</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #131722;
        }
        #tradingview-widget {
            width: 100%;
            height: 100vh;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #787b86;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading chart...</div>
    <div id="tradingview-widget"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const symbol = urlParams.get('symbol') || 'BTCUSD';
        const interval = urlParams.get('interval') || 'D';
        const theme = urlParams.get('theme') || 'dark';
        const style = parseInt(urlParams.get('style')) || 1;

        // Hide loading indicator after widget loads
        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.style.display = 'none';
            }
        }

        // Function to create widget
        function createWidget() {
            try {
                new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": symbol,
                    "interval": interval,
                    "timezone": "Etc/UTC",
                    "theme": theme,
                    "style": style.toString(),
                    "locale": "en",
                    "toolbar_bg": theme === 'dark' ? "#131722" : "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "hideideas": true,
                    "hide_top_toolbar": false,
                    "hide_legend": false,
                    "save_image": false,
                    "studies": [
                        "Volume@tv-basicstudies"
                    ],
                    "container_id": "tradingview-widget",
                    "onChartReady": function() {
                        console.log('TradingView widget loaded successfully');
                        hideLoading();
                    }
                });
            } catch (error) {
                console.error('Failed to load TradingView widget:', error);
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.textContent = 'Failed to load chart. Try refreshing.';
                }
            }
        }

        // Wait for TradingView library to load, then create widget
        let retryCount = 0;
        function initWidget() {
            if (typeof TradingView !== 'undefined' && TradingView.widget) {
                createWidget();
            } else if (retryCount < 30) { // Try for 15 seconds
                retryCount++;
                setTimeout(initWidget, 500);
            } else {
                console.error('TradingView library failed to load');
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.textContent = 'Failed to load TradingView library';
                }
            }
        }

        // Start initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initWidget);
        } else {
            initWidget();
        }

        // Fallback timeout
        setTimeout(function() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl && loadingEl.style.display !== 'none') {
                loadingEl.textContent = 'Chart loading is taking longer than expected...';
            }
        }, 10000);
    </script>
</body>
</html>
